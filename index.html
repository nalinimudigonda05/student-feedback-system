<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .register {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        .login {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
        }

        .admin {
            background: linear-gradient(135deg, #f6d365, #fda085);
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

    </style>

</head>
<body>

<div class="container">
    <h2>🎓 Student Feedback System</h2>

    <a href="/register" class="btn register">Register</a>
    <a href="/login" class="btn login">Student Login</a>
    <a href="/admin_login" class="btn admin">Admin Login</a>
</div>

</body>
</html>
