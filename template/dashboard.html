<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            width: 380px;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
        }

        .welcome {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .name {
            color: #5b86e5;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .feedback {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
        }

        .view {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
        }

        .logout {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Flash Messages */
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>📊 Dashboard</h2>

    <p class="welcome">
        Welcome <span class="name">{{ name }}</span>
    </p>

    <!-- Flash Message -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="message {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <a href="/give_feedback" class="btn feedback">Give Feedback</a>
    <a href="/view_feedback" class="btn view">View My Feedback</a>
    <a href="/logout" class="btn logout">Logout</a>

</div>

</body>
</html>
