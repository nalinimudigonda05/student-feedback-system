<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg, #84fab0, #8fd3f4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #28a745;
    color: white;
    border: none;
}
</style>

</head>

<body>

<div class="box">
<h2>Reset Password</h2>

<form method="POST">
<input type="email" name="email" placeholder="Enter your email" required>
<input type="password" name="password" placeholder="New Password" required>
<button type="submit">Reset Password</button>
</form>

</div>

</body>
</html>
